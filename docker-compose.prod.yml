# Docker Compose for Laravel Blog - Production Environment
# Version: 3.8

services:
  # ============================================
  # PHP-FPM Application Service (Production)
  # ============================================
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    container_name: blog_app_prod
    restart: always
    working_dir: /var/www/html
    volumes:
      - laravel_storage:/var/www/html/storage
      - laravel_cache:/var/www/html/bootstrap/cache
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    networks:
      - blog_network_prod
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # Nginx Web Server (Production)
  # ============================================
  web:
    image: nginx:1.27-alpine
    container_name: blog_web_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - laravel_storage:/var/www/html/storage:ro
      - frontend_dist:/var/www/html/public/assets:ro
      - certbot_data:/etc/letsencrypt:ro
    networks:
      - blog_network_prod
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # PostgreSQL Database (Production)
  # ============================================
  db:
    image: postgres:17-alpine
    container_name: blog_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - blog_network_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # Redis Cache & Queue (Production)
  # ============================================
  redis:
    image: redis:7.4-alpine
    container_name: blog_redis_prod
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data_prod:/data
    networks:
      - blog_network_prod
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # Laravel Queue Worker
  # ============================================
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    container_name: blog_queue_prod
    restart: always
    working_dir: /var/www/html
    volumes:
      - laravel_storage:/var/www/html/storage
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      - APP_ENV=production
      - QUEUE_CONNECTION=redis
    networks:
      - blog_network_prod
    depends_on:
      - app
      - redis
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # Laravel Scheduler
  # ============================================
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    container_name: blog_scheduler_prod
    restart: always
    working_dir: /var/www/html
    volumes:
      - laravel_storage:/var/www/html/storage
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction >> /dev/null 2>&1; sleep 60; done"
    environment:
      - APP_ENV=production
    networks:
      - blog_network_prod
    depends_on:
      - app
      - db
      - redis
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

# ============================================
# Networks
# ============================================
networks:
  blog_network_prod:
    driver: bridge
    name: blog_network_prod

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data_prod:
    name: blog_postgres_data_prod
  redis_data_prod:
    name: blog_redis_data_prod
  laravel_storage:
    name: blog_laravel_storage
  laravel_cache:
    name: blog_laravel_cache
  frontend_dist:
    name: blog_frontend_dist
  certbot_data:
    name: blog_certbot_data