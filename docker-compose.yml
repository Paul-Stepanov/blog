# Docker Compose for Laravel Blog - Development Environment
# Version: 3.8

services:
  # ============================================
  # PHP-FPM Application Service
  # ============================================
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    container_name: blog_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./laravel:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini:ro
    environment:
      - PHP_IDE_CONFIG=serverName=blog
      - XDEBUG_MODE=debug,coverage
      - XDEBUG_CONFIG=client_host=host.docker.internal client_port=9003
    networks:
      - blog_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================
  # Nginx Web Server
  # ============================================
  web:
    image: nginx:1.27-alpine
    container_name: blog_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./laravel:/var/www/html
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/var/www/html/public/assets:ro
    networks:
      - blog_network
    depends_on:
      - app
      - node
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:17-alpine
    container_name: blog_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-blog}
      POSTGRES_USER: ${DB_USERNAME:-blog_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - blog_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-blog_user} -d ${DB_DATABASE:-blog}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis Cache & Queue
  # ============================================
  redis:
    image: redis:7.4-alpine
    container_name: blog_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - blog_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Node.js for Vue.js Frontend Development
  # ============================================
  node:
    image: node:24-alpine
    container_name: blog_node
    restart: unless-stopped
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost/api
      - npm_config_cache=/app/.npm-cache
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - blog_network
    stdin_open: true
    tty: true

  # ============================================
  # Adminer - Database Management UI
  # ============================================
  adminer:
    image: adminer:4.8.1-standalone
    container_name: blog_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha-dark
    networks:
      - blog_network
    depends_on:
      - db

  # ============================================
  # Mailpit - Email Testing (optional)
  # ============================================
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: blog_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - blog_network

# ============================================
# Networks
# ============================================
networks:
  blog_network:
    driver: bridge
    name: blog_network

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    name: blog_postgres_data
  redis_data:
    name: blog_redis_data