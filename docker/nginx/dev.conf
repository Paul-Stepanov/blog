# Nginx DEVELOPMENT configuration for Laravel Blog
# Supports Vite dev server with HMR

# ============================================
# Rate Limiting Zones (relaxed for development)
# ============================================
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

# ============================================
# Upstreams
# ============================================
# Upstream for PHP-FPM
upstream php-fpm {
    server app:9000;
    keepalive 16;
}

# Upstream for Vite dev server
upstream vite-dev {
    server node:5173;
    keepalive 4;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /var/www/html/public;
    index index.php index.html;

    # Development logging (verbose)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log debug;

    # CORS headers for development
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, X-CSRF-TOKEN" always;

    # Handle OPTIONS preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Vite HMR WebSocket
    location /hmr {
        proxy_pass http://vite-dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Vite dev server assets (/@fs, /@vite, /@id)
    location ~ ^/(@fs|@vite|@id|node_modules) {
        proxy_pass http://vite-dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vue.js frontend in development (proxy to Vite)
    location /app {
        proxy_pass http://vite-dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Laravel API endpoints
    location /api {
        # Rate limiting (relaxed for development)
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Laravel authentication endpoints (still protected in dev)
    location /login {
        limit_req zone=login_limit burst=10 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /logout {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Laravel storage (uploaded files)
    location /storage {
        alias /var/www/html/storage/app/public;
        expires 1d;
        add_header Cache-Control "public";
    }

    # PHP-FPM handler
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120s;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Allow .env in development (for debugging only)
    # location ~* \.env$ {
    #     deny all;
    # }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Default: Vue.js frontend (proxy to Vite dev server)
    location / {
        proxy_pass http://vite-dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}