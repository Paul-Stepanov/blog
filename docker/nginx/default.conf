# Nginx configuration for Laravel Blog
# Supports both API (PHP-FPM) and Vue.js frontend

# ============================================
# Rate Limiting Zones
# ============================================
# General API rate limit: 10 requests per second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# Login rate limit: 5 requests per minute per IP (brute force protection)
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
# Password reset: 3 requests per minute per IP
limit_req_zone $binary_remote_addr zone=password_reset_limit:10m rate=3r/m;

# ============================================
# Upstreams
# ============================================
# Upstream for PHP-FPM
upstream php-fpm {
    server app:9000;
    keepalive 16;
}

# Upstream for Vite dev server (development only)
upstream vite-dev {
    server node:5173;
    keepalive 4;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /var/www/html/public;
    index index.php index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Laravel API endpoints (with rate limiting)
    location /api {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Laravel authentication endpoints (strict rate limiting for security)
    location /login {
        limit_req zone=login_limit burst=5 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /logout {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Password reset endpoints (strict rate limiting)
    location ~ ^/(forgot-password|reset-password) {
        limit_req zone=password_reset_limit burst=3 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Laravel storage (uploaded files)
    location /storage {
        alias /var/www/html/storage/app/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # PHP-FPM handler
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
        fastcgi_read_timeout 60s;
        fastcgi_keep_conn on;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~* \.(env|log|yaml|yml|md|json|lock)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Static assets caching
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # CSS/JS caching
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Default: serve Vue.js frontend or Laravel
    location / {
        # First try to serve static files
        try_files $uri $uri/ /index.php?$query_string;
    }
}