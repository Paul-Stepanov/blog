; PHP-FPM pool configuration for development
[www]

user = www-data
group = www-data

listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500

; Logging - use file instead of stderr for development
access.log = /var/www/html/storage/logs/php-fpm-access.log
slowlog = /var/www/html/storage/logs/php-fpm-slow.log
request_slowlog_timeout = 5s

; PHP settings
php_admin_value[error_log] = /var/www/html/storage/logs/php-fpm-error.log
php_admin_flag[log_errors] = on

; Environment variables
clear_env = no